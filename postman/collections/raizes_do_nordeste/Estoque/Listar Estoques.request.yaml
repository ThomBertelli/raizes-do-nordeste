$kind: http-request
name: Listar Estoques
url: "{{base_url}}/api/estoques?lojaId={{loja_id}}"
method: GET
headers:
  - key: Authorization
    value: Bearer {{token_gerencia_matriz}}
    disabled: true
  - key: Authorization
    value: Bearer {{token_gerente}}
queryParams:
  lojaId: "{{loja_id}}"
order: 1000
