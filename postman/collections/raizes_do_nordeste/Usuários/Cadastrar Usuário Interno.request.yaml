$kind: http-request
name: Cadastrar Usuário Interno
description: Use GERENCIA_MATRIZ ou ADMIN. GERENTE so pode criar FUNCIONARIO.
  CLIENTE nao pode ser criado por esta API.
url: "{{base_url}}/api/usuarios"
method: POST
headers:
  - key: Authorization
    value: Bearer {{token_gerencia_matriz}}
    disabled: true
  - key: Authorization
    value: Bearer {{token_gerente}}
body:
  type: json
  content: |
    {
      "nome": "Marcos Paulo Bezerra",
      "email": "marcospaulo@raizesnordeste.com.br",
      "senha": "Mpaulo@2026",
      "perfil": "FUNCIONARIO"

    }
order: 1000
