$kind: http-request
description: Pode ser executado por CLIENTE, FUNCIONARIO ou GERENTE. O DTO aceita lojaId, canalPedido, itens e moedasFidelidade.
url: "{{base_url}}/api/pedidos"
method: POST
headers:
  Authorization: Bearer {{token_cliente}}
  Idempotency-Key: "{{idempotency_key}}"
body:
  type: json
  content: |
    {
      "lojaId": {{loja_id}},
      "canalPedido": "APP",
      "itens": [
        { "produtoId": {{produto_id}}, "quantidade": 2 }
      ],
      "moedasFidelidade": 0.00
    }
order: 1000
